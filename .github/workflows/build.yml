name: build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3-dev

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Headless smoke test (Linux)
        if: runner.os == 'Linux'
        env:
          MPLBACKEND: Agg
        run: |
          ./build/minimal_plot --save minimal_plot.png --no-show
          ./build/ou_tutorial --save ou_tutorial.png --no-show
          test -f minimal_plot.png
          test -f ou_tutorial.png

      - name: Headless smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          MPLBACKEND: Agg
          PYTHONHOME: ${{ env.pythonLocation }}
          PYTHONPATH: ${{ env.pythonLocation }}\Lib;${{ env.pythonLocation }}\DLLs
        run: |
          $minimal = "build/Release/minimal_plot.exe"
          $tutorial = "build/Release/ou_tutorial.exe"
          if (-not (Test-Path $minimal)) { $minimal = "build/minimal_plot.exe" }
          if (-not (Test-Path $tutorial)) { $tutorial = "build/ou_tutorial.exe" }
          & $minimal --save minimal_plot.png --no-show
          & $tutorial --save ou_tutorial.png --no-show
          if (-not (Test-Path "minimal_plot.png")) { throw "minimal_plot.png not found" }
          if (-not (Test-Path "ou_tutorial.png")) { throw "ou_tutorial.png not found" }

      - name: Upload plot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plots-${{ matrix.os }}
          path: |
            minimal_plot.png
            ou_tutorial.png
